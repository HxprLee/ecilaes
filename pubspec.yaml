name: ecilaes
description: "A local/streaming, cross-platform music player. Licensed under GPL-3.0."
publish_to: 'none'
copyright: "Copyright (C) 2024 hxprlee"

version: 0.5.4

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  path_provider: ^2.1.5
  audio_service: ^0.18.18
  audio_service_mpris: ^0.2.0
  audio_service_platform_interface: ^0.1.0
  dbus: ^0.7.10
  flutter_acrylic: ^1.1.4
  just_audio: ^0.10.5
  just_audio_media_kit: ^2.1.0
  media_kit_libs_linux: ^1.2.1
  media_kit_libs_android_audio: ^1.2.1
  media_kit_libs_windows_audio: ^1.0.9
  font_awesome_flutter: ^11.0.0
  http: ^1.6.0
  dart_discord_presence: ^1.1.0
  shared_preferences: ^2.2.2
  go_router: ^17.0.1
  signals: ^6.3.0
  signals_flutter: ^6.3.0
  permission_handler: ^12.0.1
  uuid: ^4.5.1
  super_sliver_list: ^0.4.1
  bitsdojo_window: ^0.1.6
  flutter_single_instance: ^1.7.0
  nativeapi: ^0.1.0
  window_manager: ^0.5.1
  file_picker: ^10.3.10
  home_widget: ^0.9.2
  file_selector: ^1.1.0
  palette_generator_master: ^1.0.1
  youtube_explode_dart: ^3.0.5
  ytmusicapi_dart: ^2.3.0
  flutter_curl: ^0.8.0
  scroll_to_index: ^3.0.1
  romanize: ^0.0.3
  audio_metadata_reader: ^1.4.2
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.2.0
  marquee: ^2.3.0
  crypto: ^3.0.7
  flutter_inappwebview: ^6.1.5
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/ic_launcher.png"
  adaptive_icon_background: "#11171C" # Darker background to match themed icons
  adaptive_icon_foreground: "assets/icons/foreground.png"
  adaptive_icon_foreground_inset: 27
  adaptive_icon_monochrome: "assets/icons/foreground_monochorme.png"

flutter:
  uses-material-design: true

  fonts:
    - family: Iosevka Nerd Font
      fonts:
        - asset: assets/fonts/IosevkaNerdFont-Regular.ttf
        - asset: assets/fonts/IosevkaNerdFont-Bold.ttf
          weight: 700
  assets:
    - assets/app_icon.svg
