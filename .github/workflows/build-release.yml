# Build & Release workflow for Ecilaes.
#
# Triggered by:
#   - Push tag matching v*  (e.g. v0.5.1)
#   - Manual dispatch        (version derived from pubspec.yaml)
#
# Produces:
#   - Android: universal APK + ABI-split APKs (arm64-v8a, armeabi-v7a, x86_64)
#   - Linux:   AppImage
#
# Signing note: APKs are signed with debug keystore by default.
# For production, add key.properties + ANDROID_KEYSTORE_* secrets.
# See android/app/build.gradle.kts signingConfig block.

name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.5.1). Falls back to pubspec.yaml.'
        required: false

jobs:
  android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build universal APK
        run: flutter build apk --release

      - name: Build ABI-split APKs
        run: flutter build apk --release --split-per-abi

      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/app-*.apk
          if-no-files-found: error

  linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev file

      - name: Install appimagetool
        run: |
          wget -q -O /tmp/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool
          # Extract instead of mounting FUSE (unavailable on GHA runners)
          cd /tmp && ./appimagetool --appimage-extract > /dev/null 2>&1
          sudo mv squashfs-root /opt/appimagetool
          sudo ln -sf /opt/appimagetool/AppRun /usr/local/bin/appimagetool

      - name: Install dependencies
        run: flutter pub get

      - name: Build & package AppImage
        run: bash scripts/build_all.sh --skip-android

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: build/release/*.AppImage
          if-no-files-found: error

  release:
    name: Create Release
    needs: [android, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Strip 'v' prefix from ref, e.g. refs/tags/v0.5.1 → 0.5.1
            TAG="${{ github.ref_name }}"
            VER="${TAG#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VER="${{ inputs.version }}"
          else
            VER="$(grep '^version:' pubspec.yaml | awk '{print $2}' | tr -d ' ')"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4

      - name: List artifacts
        run: |
          echo "=== android-apks ==="
          ls -lh android-apks/ 2>/dev/null || echo "(empty)"
          echo "=== linux-appimage ==="
          ls -lh linux-appimage/ 2>/dev/null || echo "(empty)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: |
            android-apks/app-*.apk
            linux-appimage/*.AppImage
          generate_release_notes: true
          fail_on_unmatched_files: true
